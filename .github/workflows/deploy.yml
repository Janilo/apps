name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Só publica se o secret CLOUDFLARE_API_TOKEN existir (evita run vermelho antes do setup)
      - name: Check token
        id: check
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "has_token=${TOKEN:+true}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.has_token == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e1a48cde62b1e7a113befae43e8175f2
          command: pages deploy . --project-name=riskjud --branch=main
